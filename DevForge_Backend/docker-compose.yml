# ==============================================================================
# DevForge Backend - Modular Docker Compose Configuration
# ==============================================================================

services:
  # ==========================================================================
  # CORE SERVICE - Always Available
  # ==========================================================================

  # FastAPI Backend Service (THE MAIN APPLICATION)
  api:
    image: devforge-backend:latest
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devforge-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - devforge-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # RAG PROFILE - Optional Services
  # ==========================================================================

  # Redis - Celery broker and result backend
  redis:
    profiles: [ "rag" ]
    image: redis:7-alpine
    container_name: devforge-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - devforge-network

  # PostgreSQL with pgvector extension
  postgres:
    profiles: [ "rag" ]
    image: pgvector/pgvector:pg16
    container_name: devforge-postgres
    environment:
      POSTGRES_USER: devforge
      POSTGRES_PASSWORD: devforge123
      POSTGRES_DB: devforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devforge" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - devforge-network

  # Celery worker
  celery-worker:
    profiles: [ "rag" ]
    image: devforge-backend:latest
    container_name: devforge-celery-worker
    command: celery -A src.workers.celery_app worker -l info -c 4
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - devforge-network

  # Flower - Celery monitoring UI
  flower:
    profiles: [ "rag" ]
    image: devforge-backend:latest
    container_name: devforge-flower
    command: celery -A src.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env.docker
    depends_on:
      - celery-worker
    restart: unless-stopped
    networks:
      - devforge-network

volumes:
  redis_data:
  postgres_data:


networks:
  devforge-network:
    driver: bridge

version: '3.8'

services:
  # Redis - Celery broker and result backend
  redis:
    image: redis:7-alpine
    container_name: devforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devforge-postgres
    environment:
      POSTGRES_USER: devforge
      POSTGRES_PASSWORD: devforge123
      POSTGRES_DB: devforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Celery worker for async tasks
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devforge-celery-worker
    command: celery -A src.workers.celery_app worker -l info -c 4
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - POSTGRES_URL=postgresql://devforge:devforge123@postgres:5432/devforge
      - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped

  # Flower - Celery monitoring UI (optional)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devforge-flower
    command: celery -A src.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - celery-worker
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

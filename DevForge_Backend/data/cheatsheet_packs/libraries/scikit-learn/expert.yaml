entries:
- id: pipeline-creation
  title: Building a Pipeline
  explanation: Combine preprocessing and estimator steps into a single reusable object.
  tags:
  - pipeline
  - preprocessing
  - estimator
  when_to_use: When you want reproducible data flow that can be cross‑validated or
    grid‑searched.
  examples:
  - title: StandardScaler + LogisticRegression Pipeline
    language: python
    code: "from sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import\
      \ StandardScaler\nfrom sklearn.linear_model import LogisticRegression\nfrom\
      \ sklearn.datasets import load_iris\n\ndata = load_iris()\nX, y = data.data,\
      \ data.target\n\npipe = Pipeline([\n    ('scaler', StandardScaler()),\n    ('clf',\
      \ LogisticRegression(max_iter=200))\n])\npipe.fit(X, y)\n"
  pitfalls:
  - Forgetting to fit the scaler before transforming new data.
  - Mixing the order of steps incorrectly, e.g., placing the estimator before preprocessing.
- id: grid-search-parameter-tuning
  title: Hyperparameter Grid Search
  explanation: Exhaustively search over specified parameter values for an estimator.
  tags:
  - grid-search
  - hyperparameter
  - cross-validation
  when_to_use: When you need optimal hyperparameters for a model.
  examples:
  - title: LogisticRegression Hyperparameter Grid
    language: python
    code: "from sklearn.model_selection import GridSearchCV\nfrom sklearn.linear_model\
      \ import LogisticRegression\nfrom sklearn.datasets import load_iris\n\ndata\
      \ = load_iris()\nX, y = data.data, data.target\n\nparam_grid = {\n    'C': [0.01,\
      \ 0.1, 1, 10],\n    'solver': ['liblinear']\n}\ngrid = GridSearchCV(LogisticRegression(max_iter=200),\
      \ param_grid,\n                    cv=5, scoring='accuracy')\ngrid.fit(X, y)\n"
  pitfalls:
  - Not specifying a cross‑validation strategy (cv) and relying on the default.
  - Using the wrong scoring metric for the problem at hand.
- id: feature-importance-plotting
  title: Visualizing Feature Importances
  explanation: Extract importance scores from tree‑based models and plot them.
  tags:
  - feature-importance
  - tree
  - visualization
  when_to_use: To interpret a model’s feature relevance and guide feature engineering.
  examples:
  - title: RandomForest Feature Importances
    language: python
    code: 'import matplotlib.pyplot as plt

      from sklearn.ensemble import RandomForestClassifier

      from sklearn.datasets import load_iris


      data = load_iris()

      X, y = data.data, data.target

      feature_names = data.feature_names


      model = RandomForestClassifier(n_estimators=100, random_state=42)

      model.fit(X, y)


      importances = model.feature_importances_

      indices = importances.argsort()[::-1]


      plt.figure(figsize=(8, 4))

      plt.title(''Feature Importances'')

      plt.bar(range(X.shape[1]), importances[indices], align=''center'')

      plt.xticks(range(X.shape[1]), [feature_names[i] for i in indices], rotation=90)

      plt.tight_layout()

      plt.show()

      '
  pitfalls:
  - Plotting importances without sorting, making interpretation hard.
  - Assuming importance scores sum to 1; they are normalized but not probabilities.
- id: cross-validation-prediction
  title: Cross‑Validated Predictions
  explanation: Use cross_val_predict to get predictions for each input as if it were
    unseen.
  tags:
  - cross-validation
  - predictions
  - model-evaluation
  when_to_use: For bias‑variance analysis or stacking pipelines.
  examples:
  - title: LogisticRegression Cross‑Validated Predictions
    language: python
    code: "from sklearn.model_selection import cross_val_predict\nfrom sklearn.linear_model\
      \ import LogisticRegression\nfrom sklearn.datasets import load_iris\n\ndata\
      \ = load_iris()\nX, y = data.data, data.target\n\npreds = cross_val_predict(LogisticRegression(max_iter=200),\n\
      \                          X, y, cv=5, method='predict')\n"
  pitfalls:
  - Misunderstanding that predictions are from a model that never saw that sample
    during training.
  - Using cross_val_predict on imbalanced data without appropriate stratification.
- id: custom-transformer
  title: Creating a Custom Scikit‑Learn Transformer
  explanation: Build a transformer by subclassing BaseEstimator and TransformerMixin.
  tags:
  - custom-transformer
  - pipeline
  - sklearn
  when_to_use: When built‑in transformers don’t meet your feature engineering needs.
  examples:
  - title: High‑Variance Feature Selector
    language: python
    code: "from sklearn.base import BaseEstimator, TransformerMixin\nimport numpy\
      \ as np\n\nclass HighVarianceSelector(BaseEstimator, TransformerMixin):\n  \
      \  def __init__(self, threshold=0.5):\n        self.threshold = threshold\n\n\
      \    def fit(self, X, y=None):\n        self.std_ = np.std(X, axis=0)\n    \
      \    self.selected_ = np.where(self.std_ >= self.threshold)[0]\n        return\
      \ self\n\n    def transform(self, X):\n        return X[:, self.selected_]\n"
  pitfalls:
  - Forgetting to implement both fit and transform methods.
  - Returning the original array instead of a transformed subset.
- id: imputer-usage
  title: Handling Missing Data with SimpleImputer
  explanation: Impute missing values using strategies like mean or most_frequent.
  tags:
  - imputation
  - preprocessing
  - missing-data
  when_to_use: When the dataset contains NaNs that must be handled before training.
  examples:
  - title: Median Imputation
    language: python
    code: 'from sklearn.impute import SimpleImputer

      from sklearn.datasets import load_iris

      import numpy as np


      data = load_iris()

      X, y = data.data, data.target

      X_missing = X.copy()

      X_missing[0, 0] = np.nan


      imputer = SimpleImputer(strategy=''median'')

      X_imputed = imputer.fit_transform(X_missing)

      '
  pitfalls:
  - Applying the imputer after scaling, which can bias the scaler.
  - Not setting the same imputer instance for training and test data.
- id: polynomial-features
  title: Generating Polynomial Features
  explanation: Expand feature space with PolynomialFeatures for linear models.
  tags:
  - polynomial
  - feature-expansion
  - linear-model
  when_to_use: When linear models need higher‑order interactions.
  examples:
  - title: Degree‑2 Polynomial Features with LinearRegression
    language: python
    code: 'from sklearn.preprocessing import PolynomialFeatures

      from sklearn.linear_model import LinearRegression

      from sklearn.datasets import load_iris


      data = load_iris()

      X, y = data.data, data.target


      poly = PolynomialFeatures(degree=2, include_bias=False)

      X_poly = poly.fit_transform(X)


      model = LinearRegression()

      model.fit(X_poly, y)

      '
  pitfalls:
  - Overfitting due to an explosion in dimensionality.
  - Forgetting to drop the bias term if the model already includes an intercept.

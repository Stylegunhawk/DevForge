pack:
  language: python
  skill_level: expert
  version: 1
  library: pydantic
  library_version_floor: 2.6.0
  last_reviewed: '2026-05-15'
  reviewer: bootstrap
entries:
- id: model-basic
  title: Basic Model
  explanation: Define a simple Pydantic model with type annotations for data validation.
  tags:
  - model
  - validation
  when_to_use: When you need type-safe data structures for configuration or API payloads.
  examples:
  - title: Define and instantiate
    language: python
    code: "from pydantic import BaseModel\n\nclass User(BaseModel):\n    id: int\n\
      \    name: str\n    age: int\n\nuser = User(id=1, name=\"Alice\", age=30)\n\
      print(user)\n"
  pitfalls:
  - Forgetting to inherit from BaseModel causes Pydantic to skip validation.
  - Using mutable default values (e.g., lists) without Field(default_factory=...)
    leads to shared state.
- id: complex-types
  title: Complex Nested Types
  explanation: Handle nested models, lists, and dictionaries using Pydantic's type
    annotations.
  tags:
  - nested
  - collections
  when_to_use: When representing hierarchical data such as API responses or database
    rows.
  examples:
  - title: Nested models with lists
    language: python
    code: "from pydantic import BaseModel\nfrom typing import List\n\nclass Address(BaseModel):\n\
      \    street: str\n    city: str\n\nclass User(BaseModel):\n    name: str\n \
      \   addresses: List[Address]\n\ndata = {\n    \"name\": \"Bob\",\n    \"addresses\"\
      : [\n        {\"street\": \"123 Elm\", \"city\": \"Metropolis\"},\n        {\"\
      street\": \"456 Oak\", \"city\": \"Gotham\"}\n    ]\n}\nuser = User(**data)\n\
      print(user)\n"
  pitfalls:
  - Mixing plain lists with typing.List without import leads to runtime errors.
  - Omitting quotes around nested dict keys can cause validation to fail unexpectedly.
- id: field-constraints
  title: Field Constraints
  explanation: Enforce constraints like min_length, regex, and range on fields with
    Field(...).
  tags:
  - validation
  - constraints
  when_to_use: When you need to guarantee data meets business rules before processing.
  examples:
  - title: String and numeric constraints
    language: python
    code: "from pydantic import BaseModel, Field\n\nclass Product(BaseModel):\n  \
      \  name: str = Field(..., min_length=3, max_length=50)\n    price: float = Field(...,\
      \ gt=0, lt=1000)\n\nproduct = Product(name=\"Widget\", price=19.99)\nprint(product)\n"
  pitfalls:
  - Using incorrect comparison operators (e.g., ge vs gt) can lead to off-by-one errors.
  - Forgetting to set default values when constraints are required causes validation
    to fail.
- id: custom-validators
  title: Custom Validators
  explanation: Define methods with @validator to implement complex validation logic.
  tags:
  - validation
  - custom
  when_to_use: When built-in constraints are insufficient for domain-specific checks.
  examples:
  - title: Email format and password strength
    language: python
    code: "from pydantic import BaseModel, validator, ValidationError\nimport re\n\
      \nclass Account(BaseModel):\n    email: str\n    password: str\n\n    @validator(\"\
      email\")\n    def email_must_contain_at(cls, v):\n        if \"@\" not in v:\n\
      \            raise ValueError(\"must contain @\")\n        return v\n\n    @validator(\"\
      password\")\n    def password_strength(cls, v):\n        if len(v) < 8 or not\
      \ re.search(r\"\\d\", v):\n            raise ValueError(\"weak password\")\n\
      \        return v\n\ntry:\n    Account(email=\"userexample.com\", password=\"\
      short\")\nexcept ValidationError as e:\n    print(e)\n"
  pitfalls:
  - Forgetting to return the value from a validator results in None being stored.
  - Using the same validator on multiple fields without specifying `each_item=True`
    leads to unexpected behavior.
- id: orm-mode
  title: ORM Mode
  explanation: Enable Pydantic to read from ORM objects by setting orm_mode = True.
  tags:
  - orm
  - integration
  when_to_use: When mapping SQLAlchemy or other ORM entities to Pydantic models for
    API responses.
  examples:
  - title: SQLAlchemy to Pydantic
    language: python
    code: "from pydantic import BaseModel\nfrom sqlalchemy import Column, Integer,\
      \ String, create_engine\nfrom sqlalchemy.orm import declarative_base, Session\n\
      \nBase = declarative_base()\n\nclass UserORM(Base):\n    __tablename__ = \"\
      users\"\n    id = Column(Integer, primary_key=True)\n    name = Column(String)\n\
      \nclass UserModel(BaseModel):\n    id: int\n    name: str\n\n    class Config:\n\
      \        orm_mode = True\n\nengine = create_engine(\"sqlite:///:memory:\")\n\
      Base.metadata.create_all(engine)\n\nwith Session(engine) as session:\n    orm_user\
      \ = UserORM(id=1, name=\"Carol\")\n    session.add(orm_user)\n    session.commit()\n\
      \n    user = UserModel.from_orm(orm_user)\n    print(user)\n"
  pitfalls:
  - Neglecting to set orm_mode leads to AttributeError when accessing ORM attributes.
  - Using non-serializable types in ORM objects can cause serialization errors.
- id: model-config
  title: Advanced Model Config
  explanation: Customize Pydantic behavior (e.g., allow_population_by_field_name,
    arbitrary_types_allowed).
  tags:
  - config
  - customization
  when_to_use: When you need to adapt Pydantic to legacy APIs or to allow non-primitive
    types.
  examples:
  - title: Custom aliasing and arbitrary types
    language: python
    code: "from pydantic import BaseModel, Field\nfrom datetime import datetime\n\n\
      class Event(BaseModel):\n    event_time: datetime = Field(..., alias=\"time\"\
      )\n    data: dict\n\n    class Config:\n        allow_population_by_field_name\
      \ = True\n        arbitrary_types_allowed = True\n        json_encoders = {datetime:\
      \ lambda v: v.isoformat()}\n\nevent = Event(time=\"2026-05-15T12:00:00Z\", data={\"\
      key\": \"value\"})\nprint(event.json())\n"
  pitfalls:
  - Overusing arbitrary_types_allowed can bypass validation and lead to runtime errors.
  - Forgetting to provide aliases when accessing fields by original names results
    in KeyError.

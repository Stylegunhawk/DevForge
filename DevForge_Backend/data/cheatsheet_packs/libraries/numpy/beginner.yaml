pack:
  language: Python
  skill_level: beginner
  version: 1
  library: numpy
  library_version_floor: 2.0.0
  last_reviewed: '2026-05-15'
  reviewer: bootstrap
entries:
- id: array-creation
  title: Creating numpy arrays
  explanation: Use np.array() to create arrays from lists or tuples.
  tags:
  - creation
  - array
  when_to_use: When you need a multi-dimensional numeric container.
  examples:
  - title: From a Python list
    language: Python
    code: 'import numpy as np

      arr = np.array([1, 2, 3, 4, 5])

      '
  pitfalls:
  - Using a Python list directly without np.array() loses performance benefits.
  - Mixing nested lists of unequal lengths leads to an array of dtype object.
- id: array-reshape
  title: Reshaping arrays
  explanation: Use reshape to change shape without copying data.
  tags:
  - reshape
  - shape
  when_to_use: When you need to reorganize dimensions for operations.
  examples:
  - title: Reshape a flat array into a matrix
    language: Python
    code: 'import numpy as np

      arr = np.arange(6).reshape(2, 3)

      '
  pitfalls:
  - Reshaping to a shape that does not match the total number of elements causes a
    ValueError.
  - Using reshape on a non-contiguous array may inadvertently copy data.
- id: arithmetic-operations
  title: Element-wise arithmetic
  explanation: NumPy performs element-wise math on arrays automatically.
  tags:
  - math
  - arithmetic
  - broadcasting
  when_to_use: When applying mathematical formulas to whole arrays.
  examples:
  - title: Add and multiply two arrays
    language: Python
    code: 'import numpy as np

      a = np.array([1, 2, 3])

      b = np.array([4, 5, 6])

      c = a + b

      d = a * b

      '
  pitfalls:
  - Forgetting that operations are element-wise can lead to unexpected results if
    arrays differ in shape.
  - Using Python's built-in operators on lists instead of NumPy arrays will perform
    list concatenation.
- id: broadcasting
  title: Broadcasting rules
  explanation: Broadcasting extends arrays of smaller shape to match larger ones for
    operations.
  tags:
  - broadcasting
  - math
  when_to_use: When combining arrays of different shapes.
  examples:
  - title: Add a scalar to an array
    language: Python
    code: 'import numpy as np

      a = np.array([1, 2, 3])

      b = np.array([10])

      c = a + b  # broadcasting

      '
  pitfalls:
  - Misunderstanding broadcasting can cause silent shape mismatches and incorrect
    calculations.
  - Applying operations that require element-wise compatibility on mismatched shapes
    raises a ValueError.
- id: indexing-slicing
  title: Indexing and slicing
  explanation: Use integers, slices, or boolean masks to access subarrays.
  tags:
  - indexing
  - slicing
  - masks
  when_to_use: When you need to extract or modify parts of an array.
  examples:
  - title: Slice and mask an array
    language: Python
    code: 'import numpy as np

      arr = np.arange(10)

      sub = arr[2:7]

      mask = arr > 5

      filtered = arr[mask]

      '
  pitfalls:
  - Using a slice that exceeds array bounds returns an empty array instead of raising
    an error.
  - Forgetting that boolean masks must be the same shape as the array leads to broadcasting
    errors.
- id: random-generation
  title: Random number generation
  explanation: Use numpy.random to generate random arrays for simulations.
  tags:
  - random
  - statistics
  when_to_use: When generating test data or stochastic models.
  examples:
  - title: Generate random floats and integers
    language: Python
    code: 'import numpy as np

      rand_float = np.random.rand(2, 3)

      rand_int = np.random.randint(1, 10, size=(4,))

      '
  pitfalls:
  - Relying on the global random seed without setting it reproducibly can lead to
    non-deterministic results.
  - Using np.random.rand with large output sizes can consume excessive memory if not
    managed carefully.
